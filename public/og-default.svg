<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2540"/>
      <stop offset="1" stop-color="#051324"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fondo marino -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Banda roja vertical decorativa derecha -->
  <rect x="900" y="0" width="6" height="630" fill="#DC2626"/>
  <rect x="906" y="0" width="294" height="630" fill="rgba(220,38,38,0.08)"/>

  <!-- REC badge esquina superior derecha -->
  <g transform="translate(1020, 50)">
    <rect width="140" height="36" rx="18" fill="#ffffff"/>
    <circle cx="22" cy="18" r="6" fill="#DC2626"/>
    <text x="38" y="24" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#DC2626" letter-spacing="2.5">REC ACTIVO</text>
  </g>

  <!-- Cámara ícono grande izquierda -->
  <g transform="translate(80, 150)" stroke="#DC2626" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 32 a8 8 0 0 1 8 -8 h120 l40 32 v64 a8 8 0 0 1 -8 8 h-152 a8 8 0 0 1 -8 -8 z"/>
    <circle cx="60" cy="68" r="22" fill="rgba(220,38,38,0.15)" stroke="#DC2626" stroke-width="6"/>
    <circle cx="60" cy="68" r="8" fill="#DC2626"/>
    <circle cx="148" cy="36" r="3" fill="#DC2626"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 320)">
    <circle cx="6" cy="6" r="6" fill="#DC2626"/>
    <text x="22" y="11" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#DC2626" letter-spacing="3">CCTV PROFESIONAL · CDMX Y ZONA METROPOLITANA</text>
  </g>

  <!-- Headline grande -->
  <text x="80" y="395" font-family="Montserrat, Arial, sans-serif" font-size="78" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Cámaras de</text>
  <text x="80" y="475" font-family="Montserrat, Arial, sans-serif" font-size="78" font-weight="900" fill="#DC2626" letter-spacing="-2">Seguridad</text>

  <!-- Subtítulo -->
  <text x="80" y="515" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.85)">para tu hogar, comercio e industria · 10+ años · Garantía 2 años</text>

  <!-- Línea marker -->
  <rect x="80" y="540" width="60" height="4" rx="2" fill="#DC2626"/>

  <!-- Footer brand -->
  <g transform="translate(80, 565)">
    <text font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">CÁMARA</text>
    <text x="98" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="900" fill="#DC2626">.</text>
    <text x="108" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">SEGURIDAD</text>
    <text x="290" y="-2" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">CCTV · INSTALACIÓN · MONITOREO</text>
  </g>

  <!-- Right column: brands -->
  <g transform="translate(940, 200)" font-family="Montserrat, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text font-size="11" font-weight="700" fill="#DC2626" letter-spacing="3">EQUIPO PROFESIONAL</text>
    <text y="32" font-size="22">Hikvision</text>
    <text y="62" font-size="22">Dahua</text>
    <text y="92" font-size="22">Provision-ISR</text>
    <text y="122" font-size="22">Ezviz · Axis</text>
  </g>

  <!-- WhatsApp pill bottom right -->
  <g transform="translate(940, 530)">
    <rect width="200" height="48" rx="10" fill="#DC2626"/>
    <text x="100" y="30" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">COTIZA POR WHATSAPP</text>
  </g>
</svg>
